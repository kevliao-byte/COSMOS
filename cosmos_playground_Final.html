function boxBlur(pixels,w,h,radius){const r=Math.max(1,Math.min(Math.round(radius),24));const tmp=new Uint8ClampedArray(pixels.length),out=new Uint8ClampedArray(pixels.length);for(let y=0;y<h;y++)for(let x=0;x<w;x++){let rr=0,g=0,b=0,n=0;for(let dx=-r;dx<=r;dx++){const nx=Math.min(w-1,Math.max(0,x+dx)),i=(y*w+nx)*4;rr+=pixels[i];g+=pixels[i+1];b+=pixels[i+2];n++;}const o=(y*w+x)*4;tmp[o]=rr/n;tmp[o+1]=g/n;tmp[o+2]=b/n;tmp[o+3]=pixels[o+3];}for(let y=0;y<h;y++)for(let x=0;x<w;x++){let rr=0,g=0,b=0,n=0;for(let dy=-r;dy<=r;dy++){const ny=Math.min(h-1,Math.max(0,y+dy)),i=(ny*w+x)*4;rr+=tmp[i];g+=tmp[i+1];b+=tmp[i+2];n++;}const o=(y*w+x)*4;out[o]=rr/n;out[o+1]=g/n;out[o+2]=b/n;out[o+3]=tmp[o+3];}return out;}

// Pick best supported MediaRecorder mime — prefer mp4, fall back to webm
function pickMime(){
  const candidates=[
    "video/mp4;codecs=avc1.42E01E,mp4a.40.2",
    "video/mp4;codecs=avc1",
    "video/mp4",
    "video/webm;codecs=vp9",
    "video/webm;codecs=vp8",
    "video/webm",
  ];
  for(const m of candidates) if(MediaRecorder.isTypeSupported(m)) return m;
  return "";
}

function pickColor(lum,palette,mode,pcts,colorRng,rndPalette){if(!palette.length)return"#fff";if(mode==="single")return palette[0];if(mode==="threshold")return palette[Math.min(Math.floor(lum*palette.length),palette.length-1)];if(mode==="weighted"){const tot=pcts.reduce((a,b)=>a+(b||0),0)||100;let rv=colorRng()*tot,cum=0;for(let i=0;i<palette.length;i++){cum+=pcts[i]||0;if(rv<=cum)return palette[i];}return palette[palette.length-1];}if(mode==="random"){const rp=rndPalette&&rndPalette.length?rndPalette:palette;return rp[Math.floor(colorRng()*rp.length)];}return palette[Math.floor(colorRng()*palette.length)];}
function buildRandomPalette(seed){const rng=mulberry32((seed*6271+1399)|0),pool=[...BRAND];for(let i=pool.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}return pool.slice(0,2+Math.floor(rng()*2));}
function gridSquare(W,H,gs){const pts=[],cols=Math.ceil(W/gs)+2,rows=Math.ceil(H/gs)+2;for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)pts.push({bx:c*gs,by:r*gs,col:c,row:r});return pts;}
function gridHex(W,H,gs){const pts=[],rh=gs*0.866,rows=Math.ceil(H/rh)+2,cols=Math.ceil(W/gs)+2;for(let r=0;r<rows;r++){const off=(r%2)*gs*0.5;for(let c=0;c<cols;c++)pts.push({bx:c*gs+off,by:r*rh,col:c,row:r});}return pts;}
function gridRadial(W,H,gs){const pts=[],cx=W/2,cy=H/2,maxR=Math.sqrt(cx*cx+cy*cy)+gs;pts.push({bx:cx,by:cy,col:0,row:0});let ring=1;while(ring*gs<maxR){const r=ring*gs,n=Math.max(6,Math.round(2*Math.PI*r/gs));for(let i=0;i<n;i++){const a=(2*Math.PI*i)/n;pts.push({bx:cx+r*Math.cos(a),by:cy+r*Math.sin(a),col:ring,row:i});}ring++;}return pts;}
function renderDots(canvas,pixels,srcW,srcH,cfg,palette,pcts,time,transparent){
  time=time||0;
  const{gridSize,dotMin,dotMax,offsetMag,offsetFreq,gridSeed,gridJitter,colorSeed,colorMode,bgColor,layout,invert,driftRadius,driftSpeed,blackPt,whitePt,gamma,rippleEnabled,rippleStrength,rippleSpeed,rippleWidth,rippleDecay}=cfg;
  if(canvas.width!==srcW)canvas.width=srcW;if(canvas.height!==srcH)canvas.height=srcH;
  const ctx=canvas.getContext("2d");ctx.clearRect(0,0,srcW,srcH);
  if(!transparent){ctx.fillStyle=bgColor||"#000";ctx.fillRect(0,0,srcW,srcH);}

  const dr=driftRadius||0,ds=driftSpeed||1,bp=blackPt??0,wp=whitePt??1,gm=gamma??1;

    const nx=noise(col*offsetFreq,row*offsetFreq)*offsetMag,ny=noise(col*offsetFreq+73.1,row*offsetFreq+91.7)*offsetMag;
    const jAmt=gridJitter*gridSize*0.5,jx=jAmt>0?(jRng()*2-1)*jAmt:0,jy=jAmt>0?(jRng()*2-1)*jAmt:0;
    const phX=phaseRng()*Math.PI*2,phY=phaseRng()*Math.PI*2,phX2=phaseRng()*Math.PI*2;
    const ddx=dr>0?Math.sin(time*ds+phX)*dr*0.7+Math.sin(time*ds*0.6+phX2)*dr*0.3:0;
    const ddy=dr>0?Math.cos(time*ds+phY)*dr*0.7+Math.cos(time*ds*0.7+phX)*dr*0.3:0;
    const cx=bx+nx+jx+ddx,cy=by+ny+jy+ddy;
    const sx=Math.max(0,Math.min(srcW-1,Math.round(bx))),sy=Math.max(0,Math.min(srcH-1,Math.round(by)));
    const i4=(sy*srcW+sx)*4;

    if(radius<0.1)continue;
    ctx.fillStyle=pickColor(lum,palette,colorMode,pcts,colorRng,rndPalette);
    ctx.beginPath();ctx.arc(cx,cy,radius,0,Math.PI*2);ctx.fill();
  }
}
function buildSVG(pixels,srcW,srcH,cfg,palette,pcts,transparent){const{gridSize,dotMin,dotMax,offsetMag,offsetFreq,gridSeed,gridJitter,colorSeed,colorMode,bgColor,layout,invert,blackPt,whitePt,gamma}=cfg;const noise=makeNoise2D(gridSeed),colorRng=mulberry32(colorSeed),jRng=mulberry32(gridSeed*31+7);const pts=layout==="hex"?gridHex(srcW,srcH,gridSize):layout==="radial"?gridRadial(srcW,srcH,gridSize):gridSquare(srcW,srcH,gridSize);const bp=blackPt??0,wp=whitePt??1,gm=gamma??1;const out=[`<svg xmlns="http://www.w3.org/2000/svg" width="${srcW}" height="${srcH}">`];if(!transparent)out.push(`<rect width="${srcW}" height="${srcH}" fill="${bgColor}"/>`);for(const{bx,by,col,row}of pts){const nx=noise(col*offsetFreq,row*offsetFreq)*offsetMag,ny=noise(col*offsetFreq+73.1,row*offsetFreq+91.7)*offsetMag;const jAmt=gridJitter*gridSize*0.5,jx=jAmt>0?(jRng()*2-1)*jAmt:0,jy=jAmt>0?(jRng()*2-1)*jAmt:0;const cx=bx+nx+jx,cy=by+ny+jy;const sx=Math.max(0,Math.min(srcW-1,Math.round(bx))),sy=Math.max(0,Math.min(srcH-1,Math.round(by)));const i4=(sy*srcW+sx)*4;let lum=(0.299*pixels[i4]+0.587*pixels[i4+1]+0.114*pixels[i4+2])/255;if(invert)lum=1-lum;lum=Math.max(0,Math.min(1,(lum-bp)/Math.max(0.001,wp-bp)));if(gm!==1)lum=Math.pow(lum,1/gm);const r=dotMin+(1-lum)*(dotMax-dotMin);if(r<0.35)continue;out.push(`<circle cx="${cx.toFixed(2)}" cy="${cy.toFixed(2)}" r="${r.toFixed(2)}" fill="${pickColor(lum,palette,colorMode,pcts,colorRng)}"/>`);}out.push("</svg>");return out.join("");}
function makeDemoPixels(W,H){const data=new Uint8ClampedArray(W*H*4);for(let y=0;y<H;y++)for(let x=0;x<W;x++){const i=(y*W+x)*4,dx=x/W-0.5,dy=y/H-0.5,dist=Math.sqrt(dx*dx+dy*dy)*2;const wave=Math.sin(x*0.05)*Math.cos(y*0.05)*0.5+0.5,lum=Math.max(0,Math.min(255,(1-dist)*180+wave*80));data[i]=lum;data[i+1]=lum*0.9;data[i+2]=lum*0.7;data[i+3]=255;}return data;}
const calcDotBounds=gs=>({minMin:0.1,maxMin:gs*0.5,minMax:gs*0.4,maxMax:gs*1.5});

function Slider({label,value,min,max,step=1,onChange,display,warn}){const shown=display!=null?display:(step<1?value.toFixed(2):Math.round(value));const[editing,setEditing]=useState(false),[draft,setDraft]=useState("");const inputRef=useRef(null);const startEdit=()=>{setDraft(String(shown));setEditing(true);setTimeout(()=>inputRef.current?.select(),0);};const commitEdit=()=>{setEditing(false);const raw=parseFloat(String(draft).replace(/[^0-9.\-]/g,""));if(!isNaN(raw))onChange(Math.max(min,Math.min(max,raw)));};const keyDown=e=>{if(e.key==="Enter")commitEdit();if(e.key==="Escape")setEditing(false);};return(<label style={{display:"block",marginBottom:14,cursor:"pointer",userSelect:"none"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}><span style={{fontSize:12,letterSpacing:"0.09em",textTransform:"uppercase",color:warn?"#f84":"#DFE1DA"}}>{label}</span>{editing?<input ref={inputRef} type="text" value={draft} onChange={e=>setDraft(e.target.value)} onBlur={commitEdit} onKeyDown={keyDown} onClick={e=>e.preventDefault()} style={{width:52,background:"#1a1a0a",border:"1px solid #F6FF43",borderRadius:3,padding:"1px 5px",color:"#F6FF43",fontSize:12,fontFamily:"'IBM Plex Mono',monospace",outline:"none",textAlign:"right"}}/>:<span onClick={e=>{e.preventDefault();startEdit();}} style={{fontSize:12,color:warn?"#f84":"#DFE1DA",fontVariantNumeric:"tabular-nums",cursor:"text",borderBottom:"1px dashed #444",paddingBottom:1,minWidth:30,textAlign:"right"}}>{shown}</span>}</div><input type="range" min={min} max={max} step={step} value={value} onChange={e=>onChange(parseFloat(e.target.value))} className="rng" style={{width:"100%",cursor:"pointer",display:"block"}}/>{warn&&<div style={{fontSize:11,color:"#f84",marginTop:4,lineHeight:1.5}}>{warn}</div>}</label>);}
function SeedRow({label,value,onChange}){return(<div style={{marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:12,letterSpacing:"0.09em",textTransform:"uppercase",color:"#DFE1DA"}}>{label}</span><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:12,color:"#DFE1DA"}}>{value}</span><button onClick={()=>onChange(Math.floor(Math.random()*9999))} style={{padding:"1px 7px",background:"#181818",border:"1px solid #2a2a2a",color:"#555",borderRadius:3,cursor:"pointer",fontSize:15,fontFamily:"inherit",lineHeight:1.4}}>⟳</button></div></div><input type="range" min={0} max={9999} step={1} value={value} onChange={e=>onChange(parseInt(e.target.value))} className="rng" style={{width:"100%",cursor:"pointer",display:"block"}}/></div>);}

    return()=>cancelAnimationFrame(rafRef.current);
  },[tick,cfg,palette,pcts,bgColor,bgTransparent]);

  const exportPNG=()=>{const a=document.createElement("a");a.download="cosmos-raster.png";a.href=canvasRef.current.toDataURL("image/png");a.click();};
  const exportSVGFile=()=>{const px=getPixels(),w=srcWRef.current,h=srcHRef.current;if(!px)return;const svg=buildSVG(px,w,h,{...cfg,bgColor},palette,pcts,bgTransparent);const a=document.createElement("a");a.download="cosmos-raster.svg";a.href=URL.createObjectURL(new Blob([svg],{type:"image/svg+xml"}));a.click();};

  const startRecord=()=>{
    const px=getPixels(),w=srcWRef.current,h=srcHRef.current;
    if(!px&&!isVideoRef.current){alert("Load an image or video first.");return;}
    if(!chosenMime){alert("MediaRecorder not supported in this browser.");return;}
    const isMp4=chosenMime.includes("mp4");
    const ext=isMp4?"mp4":"webm";
    const FPS=120,snapCfg={...cfg,bgColor},snapPalette=[...palette],snapPcts=[...pcts];
    const exportCfg=snapCfg.driftRadius>0||snapCfg.rippleEnabled?snapCfg:{...snapCfg,rippleEnabled:true};

    // rc = the single render target; preview canvas just blits from it
    const rc=document.createElement("canvas");
    const offV=document.createElement("canvas");let lW=0,lH=0;
    const previewCtx=canvasRef.current.getContext("2d");

    const stream=rc.captureStream(120);
    const rec=new MediaRecorder(stream,{mimeType:chosenMime,videoBitsPerSecond:12_000_000});
    const chunks=[];
    rec.ondataavailable=e=>{if(e.data&&e.data.size>0)chunks.push(e.data);};
    rec.onstop=()=>{
      cancelAnimationFrame(recRafRef.current);
      const blob=new Blob(chunks,{type:chosenMime});
      const a=document.createElement("a");
      a.download=`cosmos-raster.${ext}`;
      a.href=URL.createObjectURL(blob);
      a.click();
      setRecState("idle");setRecProgress(0);
      // restore normal preview loop
      redraw();
    };
    recRef.current=rec;
    // stop the live preview RAF so we're not double-rendering
    cancelAnimationFrame(rafRef.current);
    rec.start(100);
    setRecState("recording");setRecProgress(0);
    const startT=performance.now();
    const intervalMs=1000/FPS;
    let frameCount=0;
    const drive=()=>{
      const elapsed=(performance.now()-startT)/1000;
      frameCount++;
      if(frameCount%24===0) setRecProgress(Math.min(99,Math.round((elapsed/recSecs)*100)));
      if(isVideoRef.current){
        const vid=videoRef.current;
        if(vid&&vid.readyState>=2&&vid.videoWidth){
          if(vid.videoWidth!==lW||vid.videoHeight!==lH){offV.width=vid.videoWidth;offV.height=vid.videoHeight;lW=vid.videoWidth;lH=vid.videoHeight;}
          offV.getContext("2d").drawImage(vid,0,0,lW,lH);
          renderDots(rc,offV.getContext("2d").getImageData(0,0,lW,lH).data,lW,lH,snapCfg,snapPalette,snapPcts,elapsed,false);
        }
      }else{
        renderDots(rc,px,w,h,exportCfg,snapPalette,snapPcts,elapsed,false);
      }
      if(canvasRef.current){
        canvasRef.current.width=rc.width;
        canvasRef.current.height=rc.height;
        previewCtx.drawImage(rc,0,0);
      }
      if(elapsed<recSecs) recRafRef.current=setTimeout(drive,intervalMs);
      else rec.stop();
    };
    recRafRef.current=setTimeout(drive,0);
  };
  const stopRecord=()=>{clearTimeout(recRafRef.current);recRef.current&&recRef.current.stop();};

  const isMp4Out=chosenMime.includes("mp4");

  return(
    <div style={{display:"flex",height:"100vh",background:"#080808",overflow:"hidden",fontFamily:"'IBM Plex Mono',monospace"}}>
      <video ref={videoRef} style={{position:"fixed",top:0,left:0,width:1,height:1,opacity:0,pointerEvents:"none"}} playsInline preload="auto" muted loop/>
      <div style={{width:285,minWidth:285,height:"100vh",overflowY:"auto",background:"#0d0d0d",borderRight:"1px solid #1c1c1c",padding:"18px 15px",boxSizing:"border-box",color:"#ccc"}}>
        <div style={{marginBottom:20}}><div style={{fontSize:15,fontWeight:700,color:"#F6FF43",letterSpacing:"0.06em"}}>COSMOS Playground</div><div style={{fontSize:11,color:"#DFE1DA",letterSpacing:"0.1em",marginTop:3,opacity:0.4}}>Halftone dot renderer</div></div>
        <div style={SEC}>
          <span style={LBL}>Input</span>
          <div onDrop={onDrop} onDragOver={e=>e.preventDefault()} onClick={()=>fileRef.current.click()} style={{border:"1px dashed #DFE1DA",borderRadius:4,padding:"12px 8px",textAlign:"center",cursor:"pointer",fontSize:11,color:"#DFE1DA",letterSpacing:"0.07em",lineHeight:2,userSelect:"none"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#F6FF43";e.currentTarget.style.color="#F6FF43";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="#DFE1DA";e.currentTarget.style.color="#DFE1DA";}}>
            {fileName?<span>{fileName.length>25?fileName.slice(0,23)+"…":fileName}</span>:<span>DROP IMAGE / VIDEO<br/>or click to browse</span>}
          </div>
          <input ref={fileRef} type="file" accept="image/*,video/mp4,video/quicktime,.mp4,.mov,.m4v,.webm" style={{display:"none"}} onChange={e=>{if(e.target.files[0])handleFile(e.target.files[0]);e.target.value="";}}/>
          <div style={{fontSize:11,color:status.includes("✓")?"#4a9":status.includes("error")||status.includes("failed")?"#f84":"#DFE1DA",marginTop:6,lineHeight:1.6}}>{status}</div>
          <div style={{fontSize:10,color:"#DFE1DA",marginTop:4}}>Images: JPG PNG WEBP · Video: MP4 MOV WEBM</div>
        </div>
        <div style={SEC}>
          <span style={LBL}>Presets</span>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {PRESETS.map((p,i)=>{const locked=isVideo&&i!==0,active=activePreset===i;const tags={0:["Uniform grid","One colour","Bigger dots"],1:["Uniform grid","One colour","Smaller dots"],2:["Varied grid","Small jitter","One colour"],3:["Varied grid","Jitter + big dots","2+ colours"]}[i];return(<button key={i} onClick={()=>!locked&&applyPreset(i)} disabled={locked} style={{display:"flex",flexDirection:"column",alignItems:"flex-start",padding:"9px 9px 8px",background:active?"#1a1a0a":"#141414",border:`1px solid ${active?"#F6FF43":"#222"}`,borderRadius:5,cursor:locked?"not-allowed":"pointer",fontFamily:"'IBM Plex Mono',monospace",textAlign:"left",width:"100%",opacity:locked?0.3:1}}><div style={{fontSize:10,color:active?"#F6FF43":"#888",marginBottom:5}}>{i+1}</div><div style={{fontSize:11,letterSpacing:"0.08em",textTransform:"uppercase",color:active?"#F6FF43":"#E8EDED",marginBottom:6,lineHeight:1.4}}>{p.name}</div><div style={{display:"flex",gap:2,marginBottom:7}}>{p.palette.map((c,j)=>(<div key={j} style={{width:9,height:9,borderRadius:2,background:c,border:"1px solid #2a2a2a"}}/>))}<div style={{width:9,height:9,borderRadius:2,background:p.bg,border:"1px solid #2a2a2a"}}/></div><div style={{display:"flex",flexDirection:"column",gap:2}}>{tags.map((t,j)=>(<div key={j} style={{fontSize:10,color:"#E8EDED",opacity:active?1:0.6,letterSpacing:"0.04em",textTransform:"uppercase",lineHeight:1.4}}>{t}</div>))}</div></button>);})}
          </div>
        </div>
        <div style={SEC}>
          <span style={LBL}>Image Adjust</span>
          <Toggle label="Invert" value={cfg.invert} onChange={v=>setC("invert",v)}/>
          <div style={{height:1,background:"#1a1a1a",margin:"2px 0 14px"}}/>
          <Slider label="Black point" value={cfg.blackPt} min={0} max={0.95} step={0.01} onChange={v=>setC("blackPt",Math.min(v,cfg.whitePt-0.05))} display={Math.round(cfg.blackPt*255)}/>
          <Slider label="White point" value={cfg.whitePt} min={0.05} max={1} step={0.01} onChange={v=>setC("whitePt",Math.max(v,cfg.blackPt+0.05))} display={Math.round(cfg.whitePt*255)}/>
          <Slider label="Gamma" value={cfg.gamma} min={0.2} max={3} step={0.05} onChange={v=>setC("gamma",v)} display={cfg.gamma.toFixed(2)}/>
          <div style={{height:1,background:"#1a1a1a",margin:"0 0 14px"}}/>
          <Slider label="Blur" value={cfg.blurRadius} min={0} max={20} step={0.5} onChange={v=>setC("blurRadius",v)} display={cfg.blurRadius>0?cfg.blurRadius.toFixed(1)+"px":"off"}/>
        </div>
        <div style={SEC}>
          <span style={LBL}>Grid</span>
          <Slider label="Cell size" value={cfg.gridSize} min={4} max={60} onChange={setGridSize} display={Math.round(cfg.gridSize)+"px"} warn={cellSizeWarn}/>
          <Slider label="Dot min" value={cfg.dotMin} min={minMin} max={parseFloat(maxMin.toFixed(1))} step={0.1} onChange={v=>setC("dotMin",Math.min(v,cfg.dotMax-0.2))} display={cfg.dotMin.toFixed(1)}/>
          <Slider label="Dot max" value={cfg.dotMax} min={parseFloat(minMax.toFixed(1))} max={parseFloat(maxMax.toFixed(1))} step={0.5} onChange={v=>setC("dotMax",Math.max(v,cfg.dotMin+0.2))} display={cfg.dotMax.toFixed(1)+(cfg.dotMax>cfg.gridSize?" ↑":"")}/>
          {cfg.dotMax>cfg.gridSize&&<div style={{fontSize:11,color:"#5a7a5a",marginTop:-8,marginBottom:10,lineHeight:1.5}}>Dots overlap cells — print-press feel active</div>}
        </div>
        <div style={SEC}>
          <span style={LBL}>Grid Randomness</span>
          <Slider label="Jitter" value={cfg.gridJitter} min={0} max={1} step={0.01} onChange={v=>setC("gridJitter",v)} display={Math.round(cfg.gridJitter*100)+"%"}/>
          <Slider label="Offset magnitude" value={cfg.offsetMag} min={0} max={30} step={0.5} onChange={v=>setC("offsetMag",v)} display={cfg.offsetMag.toFixed(1)+"px"}/>
          <Slider label="Offset frequency" value={cfg.offsetFreq} min={0.01} max={1} step={0.01} onChange={v=>setC("offsetFreq",v)} display={cfg.offsetFreq.toFixed(2)}/>
          <SeedRow label="Grid seed" value={cfg.gridSeed} onChange={v=>setC("gridSeed",v)}/>
          <div style={{borderTop:"1px solid #161616",paddingTop:12,marginTop:2}}>
            <span style={{fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase",color:cfg.driftRadius>0?"#F6FF43":"#DFE1DA",display:"block",marginBottom:9}}>Organic Drift {cfg.driftRadius>0&&"●"}</span>
            <Slider label="Drift radius" value={cfg.driftRadius} min={0} max={40} step={0.5} onChange={v=>setC("driftRadius",v)} display={cfg.driftRadius>0?cfg.driftRadius.toFixed(1)+"px":"off"}/>
            {cfg.driftRadius>0&&<Slider label="Drift speed" value={cfg.driftSpeed} min={0.05} max={3} step={0.05} onChange={v=>setC("driftSpeed",v)} display={cfg.driftSpeed.toFixed(2)+"×"}/>}
          </div>
        </div>
        <div style={SEC}>
          <span style={{...LBL,color:cfg.rippleEnabled?"#F6FF43":"#DFE1DA"}}>Radial Ripple {cfg.rippleEnabled&&"●"}</span>
          <Toggle label="Enable ripple" value={cfg.rippleEnabled} onChange={v=>setC("rippleEnabled",v)}/>
          {cfg.rippleEnabled&&<>
            <Slider label="Speed" value={cfg.rippleSpeed} min={0.1} max={3} step={0.05} onChange={v=>setC("rippleSpeed",v)} display={cfg.rippleSpeed.toFixed(2)+"×"}/>
            <Slider label="Peak strength" value={cfg.rippleStrength} min={1.1} max={6} step={0.1} onChange={v=>setC("rippleStrength",v)} display={cfg.rippleStrength.toFixed(1)+"×"}/>
            <Slider label="Ring width" value={cfg.rippleWidth} min={0.02} max={0.5} step={0.01} onChange={v=>setC("rippleWidth",v)} display={Math.round(cfg.rippleWidth*100)+"%"}/>
            <Slider label="Wake decay" value={cfg.rippleDecay} min={0} max={1} step={0.05} onChange={v=>setC("rippleDecay",v)} display={cfg.rippleDecay.toFixed(2)}/>
          </>}
        </div>
        <div style={SEC}>
          <span style={LBL}>Grid Layout</span>
          {(activePreset===0||activePreset===1)?<div style={{display:"flex",gap:5,flexWrap:"wrap"}}><Btn active={true}>⊞ Square</Btn>{[["hex","⬡ Hex"],["radial","◎ Radial"]].map(([s,lbl])=>(<Btn key={s} active={false} sx={{opacity:0.2,cursor:"not-allowed"}}>{lbl}</Btn>))}</div>:<div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{[["square","⊞ Square"],["hex","⬡ Hex"],["radial","◎ Radial"]].map(([s,lbl])=>(<Btn key={s} active={cfg.layout===s} onClick={()=>setC("layout",s)}>{lbl}</Btn>))}</div>}
        </div>
        <div style={SEC}>
          <span style={LBL}>Color Mode</span>
          {preset.isStandard&&<SchemeColourPanel schemes={STANDARD_SCHEMES} palette={palette} pcts={pcts} bg={bgColor} setPalette={setPalette} setPcts={setPcts} setBg={setBg} videoMode={isVideo} showPct={false} singleOnly={true} bgTransparent={bgTransparent} setBgTransparent={setBgTransparent}/>}
          {preset.isVaried&&<SchemeColourPanel schemes={STANDARD_SCHEMES} palette={palette} pcts={pcts} bg={bgColor} setPalette={setPalette} setPcts={setPcts} setBg={setBg} videoMode={isVideo} showPct={false} singleOnly={true} bgTransparent={bgTransparent} setBgTransparent={setBgTransparent}/>}
          {preset.isExpressive&&<ExpressiveColourPanel cfg={cfg} setC={setC} palette={palette} setPalette={setPalette} pcts={pcts} setPcts={setPcts} bg={bgColor} setBg={setBg} videoMode={isVideo} bgTransparent={bgTransparent} setBgTransparent={setBgTransparent}/>}
        </div>
        <div style={{paddingBottom:24}}>
          <span style={LBL}>Export</span>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
            <Btn onClick={exportPNG} sx={{color:"#8AA8A8",borderColor:"#8AA8A8"}}>↓ PNG</Btn>
            <Btn onClick={exportSVGFile} sx={{color:"#80896B",borderColor:"#80896B"}}>↓ SVG</Btn>
          </div>
          <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:4,padding:"10px 10px 8px"}}>
            <div style={{fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:8,color:"#DFE1DA"}}>
              Video Export {chosenMime?`(${isMp4Out?"MP4":"WebM"})`:"(unavailable)"}
            </div>
            {!chosenMime&&<div style={{fontSize:11,color:"#f84",lineHeight:1.6}}>⚠ MediaRecorder not supported.</div>}
            {!!chosenMime&&<>
              <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:10,flexWrap:"wrap"}}>
                <span style={{fontSize:11,color:"#DFE1DA",flexShrink:0}}>Duration</span>
                {[3,5,10,15,30].map(s=>(<button key={s} onClick={()=>setRecSecs(s)} disabled={recState!=="idle"} style={{padding:"3px 6px",fontSize:11,background:recSecs===s?"#F6FF43":"#181818",color:recSecs===s?"#111":"#DFE1DA",border:"1px solid "+(recSecs===s?"#F6FF43":"#2a2a2a"),borderRadius:3,cursor:recState!=="idle"?"not-allowed":"pointer",fontFamily:"inherit",opacity:recState!=="idle"?0.4:1}}>{s}s</button>))}
              </div>
              {recState==="idle"&&(<button onClick={startRecord} style={{width:"100%",padding:"7px",fontSize:11,letterSpacing:"0.09em",textTransform:"uppercase",background:"#111",color:"#4a9",border:"1px solid #4a9",borderRadius:3,cursor:"pointer",fontFamily:"inherit"}}>⏺ Record {recSecs}s → {isMp4Out?"MP4":"WebM"}</button>)}
              {recState==="recording"&&(<div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                  <span style={{fontSize:11,color:"#F6FF43"}}>● Recording…</span>
                  <span style={{fontSize:11,color:"#F6FF43"}}>{recProgress}%</span>
                </div>
                <div style={{height:3,background:"#1a1a1a",borderRadius:2,marginBottom:6}}><div style={{height:3,background:"#F6FF43",borderRadius:2,width:recProgress+"%",transition:"width 0.3s"}}/></div>
                <button onClick={stopRecord} style={{width:"100%",padding:"5px",fontSize:11,letterSpacing:"0.09em",textTransform:"uppercase",background:"transparent",color:"#f84",border:"1px solid #f84",borderRadius:3,cursor:"pointer",fontFamily:"inherit"}}>⏹ Stop early</button>
              </div>)}
              <div style={{fontSize:10,color:"#DFE1DA",marginTop:8,lineHeight:1.6,opacity:0.4}}>
                {isMp4Out?"H.264 MP4 — plays on all devices":"VP9 WebM — Chrome, Firefox, VLC"}
              </div>
            </>}
          </div>
        </div>
      </div>
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",position:"relative",background:bgTransparent?"repeating-conic-gradient(#222 0% 25%,#333 0% 50%) 0 0/20px 20px":"#080808"}}>
        <canvas ref={canvasRef} style={{display:"block",maxWidth:"100%",maxHeight:"100vh",objectFit:"contain"}}/>
        {!hasMedia&&<div style={{position:"absolute",bottom:22,left:"50%",transform:"translateX(-50%)",fontSize:11,color:"#1e1e1e",letterSpacing:"0.12em",pointerEvents:"none",whiteSpace:"nowrap"}}>DEMO MODE — drop an image or video to begin</div>}
        {warningVisible&&(<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:10}}><div style={{background:"#111",border:"1px solid #f84",borderRadius:8,padding:"32px 36px",maxWidth:420,width:"90%",textAlign:"center"}}><div style={{fontSize:24,marginBottom:16}}>⚠</div><div style={{fontSize:13,fontWeight:700,color:"#f84",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:12}}>Outside Recommended Guidelines</div><div style={{fontSize:12,color:"#E8EDED",lineHeight:1.8,marginBottom:28}}>This combination of varied colours, radial grid, and high jitter is not recommended for production use.</div><div style={{display:"flex",gap:12,justifyContent:"center"}}><button onClick={handleRevert} style={{padding:"10px 24px",fontSize:11,letterSpacing:"0.09em",textTransform:"uppercase",background:"transparent",color:"#E8EDED",border:"1px solid #444",borderRadius:4,cursor:"pointer",fontFamily:"inherit"}}>Revert</button><button onClick={handleProceed} style={{padding:"10px 24px",fontSize:11,letterSpacing:"0.09em",textTransform:"uppercase",background:"#f84",color:"#111",border:"1px solid #f84",borderRadius:4,cursor:"pointer",fontFamily:"inherit"}}>Proceed</button></div></div></div>)}
      </div>
      <style>{`
        body{background:#080808;overflow:hidden;}
        ::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:#1e1e1e;}
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap');
        input.rng{-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:#222;outline:none;border:none;display:block;}
        input.rng::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#F6FF43;cursor:pointer;border:2px solid #0d0d0d;margin-top:-5px;}
        input.rng::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#F6FF43;cursor:pointer;border:2px solid #0d0d0d;}
        input.rng::-webkit-slider-runnable-track{height:3px;border-radius:2px;background:#222;}
        input[type=number]::-webkit-inner-spin-button{opacity:1;}
      `}</style>
    </div>
  );
}
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
